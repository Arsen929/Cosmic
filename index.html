<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Важный вопрос</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #ffe6e6;
            overflow: hidden; /* Чтобы прыгающая кнопка не создавала скролл */
        }
        h1 {
            color: #ff4d4d;
            text-align: center;
            padding: 0 20px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #yesBtn {
            background-color: #4CAF50;
            color: white;
            transition: transform 0.2s;
        }
        #yesBtn:active {
            transform: scale(0.95);
        }
        #noBtn {
            background-color: #f44336;
            color: white;
            position: relative; /* Начальная позиция */
            transition: left 0.2s ease, top 0.2s ease; /* Плавное перемещение */
        }
    </style>
</head>
<body>

    <h1>Вы меня любите?</h1>
    <div class="buttons">
        <button id="yesBtn" onclick="window.location.href='yes.html'">Да</button>
        <button id="noBtn">Нет</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton(e) {
            // Если это касание пальцем на телефоне, отменяем стандартный клик
            if (e.type === 'touchstart') {
                e.preventDefault();
            }

            // Получаем размеры окна и самой кнопки
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // Генерируем случайные координаты, чтобы кнопка не улетала за экран
            const randomX = Math.floor(Math.random() * (windowWidth - btnWidth));
            const randomY = Math.floor(Math.random() * (windowHeight - btnHeight));

            // Меняем позицию кнопки
            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Запуск функции при наведении мыши (ПК) или касании (телефон)
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton, {passive: false});
    </script>

</body>
</html>
